<!DOCTYPE html>
<html>
<head>
<title>Simple Chat Bot</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chatbox{
width:350px;
background:white;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
padding:15px;
}

.messages{
height:300px;
overflow-y:auto;
margin-bottom:10px;
}

.user{
text-align:right;
color:blue;
margin:5px;
}

.bot{
text-align:left;
color:black;
margin:5px;
}

input{
width:70%;
padding:8px;
border-radius:8px;
border:1px solid grey;
}

button{
padding:8px 12px;
border:none;
background:#ff9800;
color:white;
border-radius:8px;
}
</style>
</head>

<body>

<div class="chatbox">

<div class="messages" id="messages"></div>

<input id="input" placeholder="Ask something...">
<button onclick="send()">Send</button>

</div>

<script>

function send(){

let input = document.getElementById("input").value
let messages = document.getElementById("messages")

messages.innerHTML += "<div class='user'>"+input+"</div>"

let reply = ""

if(input.toLowerCase().includes("hello")){
reply="Hello Aditi 👋"
}

else if(input.includes("5+6") || input.includes("5 + 6")){
reply="Answer is 11"
}

else if(input.toLowerCase().includes("study")){
reply="Focus karo exams aa rahe hai 📚"
}

else{
reply="I am a simple chatbot 🤖"
}

messages.innerHTML += "<div class='bot'>"+reply+"</div>"

document.getElementById("input").value=""

}

</script>

</body>
</html>
